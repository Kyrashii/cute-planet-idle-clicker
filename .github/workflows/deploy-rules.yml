name: Deploy Firestore Rules

# Replaces the old AI Studio auto-deploy: when the rules (or related config) land on main,
# push them to the production Firebase project.
#
# Requires a repository secret FIREBASE_SERVICE_ACCOUNT containing the JSON key of a service
# account in the prod project (cute-planet-6096c) with the "Firebase Rules Admin"
# (roles/firebaserules.admin) role.

on:
  push:
    branches: [main]
    paths:
      - firestore.rules
      - firebase.json
      - .firebaserc
      - .github/workflows/deploy-rules.yml

concurrency:
  group: deploy-firestore-rules
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy firestore rules (prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # firebase-tools v15 can silently drop a service-account credential passed via
      # GOOGLE_APPLICATION_CREDENTIALS in CI (an autoAuth timeout reports the generic
      # "have you run firebase login?"), so authenticate with the dedicated Firebase
      # action, which reads the SA key from GCP_SA_KEY and runs the CLI in one shot.
      - name: Deploy Firestore rules to prod
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:rules --project prod
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
